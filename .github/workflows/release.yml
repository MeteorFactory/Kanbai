name: Kanbai — Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    uses: MeteorFactory/Orbit/.github/workflows/ci-electron.yml@main
    with:
      node-version: "22"
      os-matrix: '["macos-latest", "windows-latest"]'

  release:
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    uses: MeteorFactory/Orbit/.github/workflows/release-electron.yml@main
    with:
      node-version: "22"
    secrets:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
